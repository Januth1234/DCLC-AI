# Seed sources: Wikimedia, Common Crawl, HF. Only Parquet-native datasets (no loading scripts).
# trust_remote_code/loading scripts no longer supported in datasets 4.0+.
# See docs/CORPUS_SOURCES.md for full reference.
sources:
  # Wikimedia — Sinhala Wikipedia (Parquet)
  - name: wikimedia_wikipedia
    type: huggingface
    dataset: wikimedia/wikipedia
    config: 20231101.si
    split: train
    text_column: text
    max_rows: 500000
  # mC4 — filtered web text; keep low on Colab (~12GB RAM) to avoid "Killed" (OOM)
  - name: mc4_sinhala
    type: huggingface
    dataset: allenai/c4
    config: si
    split: train
    text_column: text
    streaming: true
    max_rows: 80000   # safe for Colab; raise to 200000+ on Kaggle or local
